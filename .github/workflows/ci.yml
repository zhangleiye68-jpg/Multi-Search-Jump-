name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show Node.js version
        run: node --version

      - name: Run tests
        run: npm test

      - name: Check extension structure
        run: npm run check:store
