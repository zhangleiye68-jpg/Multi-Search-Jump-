<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multi Search Jump 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="options-shell">
      <header class="options-header">
        <h1>Multi Search Jump 设置</h1>
      </header>

      <section class="settings-section options-search-section" aria-labelledby="options-search-heading">
        <div class="section-heading">
          <h2 id="options-search-heading">直接搜索</h2>
        </div>
        <form id="options-search-form" class="options-search-form">
          <label class="visually-hidden" for="options-search-input">搜索关键词</label>
          <input
            id="options-search-input"
            name="query"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="输入关键词"
          >
          <button id="options-search-button" type="submit">搜索</button>
        </form>
        <div
          id="options-search-history"
          class="search-history options-search-history"
          aria-label="最近搜索记录"
          hidden
        ></div>
        <p
          id="options-search-status"
          class="status-message options-search-status"
          role="status"
          aria-live="polite"
        ></p>
      </section>

      <section class="settings-section">
        <label class="switch-setting" for="auto-close-toggle">
          <span>
            <span class="setting-title">新搜索前关闭上次结果</span>
            <span class="setting-note">开启后，搜索 B 前会自动关闭搜索 A 的标签组。</span>
          </span>
          <span class="switch-control">
            <input id="auto-close-toggle" type="checkbox">
            <span class="switch-track" aria-hidden="true">
              <span class="switch-thumb"></span>
            </span>
          </span>
        </label>

        <label class="switch-setting" for="google-image-toggle">
          <span>
            <span class="setting-title">Google 图片搜索</span>
            <span id="google-mode-state" class="setting-note">图片搜索</span>
          </span>
          <span class="switch-control">
            <input id="google-image-toggle" type="checkbox">
            <span class="switch-track" aria-hidden="true">
              <span class="switch-thumb"></span>
            </span>
          </span>
        </label>

        <div class="settings-action-row">
          <span>
            <span class="setting-title">快捷键搜索</span>
            <span class="setting-note">打开 Chrome 快捷键页面，设置或修改选中文字搜索的快捷键。</span>
          </span>
          <button id="shortcut-settings-button" type="button">设置快捷键</button>
        </div>
      </section>

      <section class="settings-section">
        <div class="section-heading">
          <h2>搜索网站与顺序</h2>
        </div>
        <ul id="target-order-list" class="target-order-list" aria-label="搜索网站顺序"></ul>
      </section>

      <section class="settings-section">
        <div class="section-heading">
          <h2>历史记录</h2>
        </div>
        <div
          id="all-search-history"
          class="search-history all-search-history"
          aria-label="全部搜索记录"
          hidden
        ></div>
        <p id="all-search-history-empty" class="setting-note">暂无历史记录。</p>
      </section>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
