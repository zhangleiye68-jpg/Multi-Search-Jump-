<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multi Search Jump</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Multi Search Jump</h1>
          <p>Google / X / Facebook / TikTok</p>
        </div>
      </header>

      <form id="search-form" class="search-form">
        <label class="visually-hidden" for="search-input">搜索关键词</label>
        <input
          id="search-input"
          name="query"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="输入关键词"
        >
        <button id="search-button" type="submit">搜索</button>
      </form>

      <ul id="target-list" class="target-list" aria-label="搜索平台"></ul>

      <div class="preference-row">
        <label class="switch-setting" for="auto-close-toggle">
          <span class="setting-copy">
            <span class="setting-title">新搜索前关闭上次结果</span>
            <span id="auto-close-state" class="setting-state">开启</span>
          </span>
          <span class="switch-control">
            <input id="auto-close-toggle" type="checkbox" checked>
            <span class="switch-track" aria-hidden="true">
              <span class="switch-thumb"></span>
            </span>
          </span>
        </label>
      </div>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
