<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multi Search Jump</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <main class="panel-shell">
      <header class="panel-header">
        <div class="mark" aria-hidden="true"></div>
        <h1>Multi Search Jump</h1>
      </header>

      <form id="search-form" class="search-form">
        <label class="visually-hidden" for="search-input">搜索关键词</label>
        <input
          id="search-input"
          name="query"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="输入关键词"
        >
        <button id="search-button" type="submit">搜索</button>
      </form>
      <div
        id="search-history"
        class="search-history"
        aria-label="最近搜索记录"
        hidden
      ></div>

      <button id="options-button" class="ghost-button" type="button">设置</button>
      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="panel.js"></script>
  </body>
</html>
